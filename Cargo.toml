[package]
name = "mass_spectrometry"
version = "0.1.0"
edition = "2024"

[dependencies]
geometric-traits = { git = "https://github.com/earth-metabolome-initiative/geometric-traits" }
num-traits = "0.2"
multi_ranged = "0.1.1"
thiserror = "2"

[dev-dependencies]
criterion = { version = "0.8", features = ["html_reports"] }
proptest = "1.6"
csv = "1"

[[bench]]
name = "hungarian_cosine"
harness = false

[[bench]]
name = "entropy_similarity"
harness = false

[[bench]]
name = "modified_hungarian_cosine"
harness = false
